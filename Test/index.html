<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kretos — Fractured Realms</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Cinzel:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>
    <main id="app-root">
        <div class="loader-wrapper"><div class="loader"></div><p>summoning legends...</p></div>
    </main>
    <!-- Global Modal (used for hero/monster summaries and full details) -->
    <div id="global-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <div class="modal-swipe-area">
                <button class="modal-nav prev"><i class="fas fa-chevron-left"></i></button>
                <div class="modal-content-wrapper"></div>
                <button class="modal-nav next"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/components.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
