<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroes of Kretos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/heroes.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Cinzel:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>
    <main class="heroes-page">
        <div class="heroes-header">
            <h1>Legendary Heroes</h1>
            <div class="search-container">
                <input type="text" id="hero-search" placeholder="Search by name or secret code (secretcode<id>)..." autocomplete="off">
                <i class="fas fa-search"></i>
            </div>
        </div>
        <div id="heroes-grid" class="heroes-grid"></div>
    </main>
    <div id="global-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container modal-full">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <div class="modal-swipe-area">
                <button class="modal-nav prev"><i class="fas fa-chevron-left"></i></button>
                <div class="modal-content-wrapper"></div>
                <button class="modal-nav next"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/components.js"></script>
    <script src="js/heroes.js"></script>
</body>
</html>
