<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Kretos Versus · Arcade Fighter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper-game-wrapper">
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="1280" height="720"></canvas>
            <div id="scanlines"></div>
        </div>
        <!-- SP Touch Controls – visible only on screens ≤ 768px -->
        <div class="gameControlsforSp" id="touchControls">
            <button class="pause-btn" id="touchPauseBtn">⏸️ PAUSE</button>
            <div class="movement joystick-container" id="joystickArea">
                <div class="joystick-base" id="joystickBase">
                    <div class="joystick-stick" id="joystickStick"></div>
                </div>
            </div>
            <div class="attack-buttons">
                <button class="attack-btn punch-btn" data-key="KeyU">⚡ P</button>
                <button class="attack-btn kick-btn" data-key="KeyI">👟 K</button>
                <button class="attack-btn special-btn" data-key="KeyO">✨ S</button>
                <button class="attack-btn parry-btn" data-key="KeyP">🛡️ PARRY</button>
                <button class="attack-btn throw-btn" data-key="KeyL">🤼 THROW</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
