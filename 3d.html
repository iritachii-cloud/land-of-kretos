<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBX Mesh Only Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #container { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // --- Setup (minimal) ---
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // dark but optional

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = false;   // set true if you want auto-spin

        // --- ONE essential light (otherwise mesh is black) ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(2, 5, 3);
        scene.add(light);
        // optional ambient so backfaces aren't pitch black
        scene.add(new THREE.AmbientLight(0x404060));

        // --- Load ONLY the mesh from FBX ---
        const loader = new FBXLoader();
        loader.load('assets/models/freya.fbx', (fbx) => {
            // fbx is a Group containing all meshes, bones, etc.
            // If you want only the mesh(es) without extra transforms:
            const meshes = [];
            fbx.traverse(child => {
                if (child.isMesh) {
                    meshes.push(child);
                }
            });
            
            // Option 1: Add the whole group (keeps original hierarchy)
            scene.add(fbx);
            
            // Option 2: Add only the meshes (lose transforms, but you can reposition)
            // meshes.forEach(mesh => scene.add(mesh));
            
            // Center and scale (optional)
            const box = new THREE.Box3().setFromObject(fbx);
            const center = box.getCenter(new THREE.Vector3());
            fbx.position.sub(center);
            
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2.5 / maxDim;
            fbx.scale.set(scale, scale, scale);
            
            console.log(`Loaded ${meshes.length} mesh(es)`);
        }, undefined, (error) => console.error(error));

        // --- Animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();  // updates rotation/zoom if damping or autoRotate is on
            renderer.render(scene, camera);
        }
        animate();

        // --- Resize handling ---
        window.addEventListener('resize', () => {
            const w = container.clientWidth, h = container.clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
