<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Anti‑Character Compendium | Mobile Legends</title>
    <link rel="stylesheet" href="./anti-table.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚔️ ANTI‑CHARACTER ARCHIVE ⚔️</h1>
            <p>132 corrupted mirrors, inverted legends, and dark rivals — ready for refinement.</p>
        </header>
        <div class="table-wrapper">
            <table id="antiTable">
                <thead>
                    <tr id="tableHeader">
                        <!-- headers will be injected via JS from JSON keys -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- rows will be generated dynamically -->
                </tbody>
            </table>
        </div>
        <footer>
            <p>📌 Click any cell to edit (local only). Data is stored in <code>data.json</code> – modify the file to update the table.</p>
        </footer>
    </div>
    <script src="./anti-table.js"></script>
</body>
</html>
